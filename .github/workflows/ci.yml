name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-test-publish:
    runs-on: windows-latest
    strategy:
      matrix:
        runtime: [win-x64, win-arm64]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: 10.0.x
      - name: Restore app dependencies in locked mode
        run: dotnet restore ProcLens.csproj --locked-mode
      - name: Build with warnings as errors
        run: dotnet build ProcLens.csproj -c Release -r ${{ matrix.runtime }} --no-restore -p:TreatWarningsAsErrors=true
      - name: Restore test dependencies in locked mode
        if: matrix.runtime == 'win-x64'
        run: dotnet restore tests/ProcLens.Tests/ProcLens.Tests.csproj --locked-mode
      - name: Test
        if: matrix.runtime == 'win-x64'
        run: dotnet test tests/ProcLens.Tests/ProcLens.Tests.csproj -c Release --no-restore
      - name: Publish ${{ matrix.runtime }}
        run: dotnet publish ProcLens.csproj -c Release -r ${{ matrix.runtime }} --self-contained true --no-restore -o artifacts/${{ matrix.runtime }}
      - name: Smoke test packaged executable
        if: matrix.runtime == 'win-x64'
        shell: pwsh
        run: |
          $process = Start-Process artifacts/win-x64/ProcLens.exe -ArgumentList 'tray','--background','--port','4788','--data-dir',"$env:RUNNER_TEMP\proclens-smoke" -PassThru
          try {
            $ready = $false
            1..20 | ForEach-Object {
              if (-not $ready) {
                try { $ready = (Invoke-WebRequest http://127.0.0.1:4788/health -UseBasicParsing -TimeoutSec 1).StatusCode -eq 200 } catch { Start-Sleep -Milliseconds 250 }
              }
            }
            if (-not $ready) { throw 'Packaged dashboard health endpoint did not start.' }
          } finally {
            Stop-Process -Id $process.Id -Force -ErrorAction SilentlyContinue
          }
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ProcLens-${{ matrix.runtime }}
          path: artifacts/${{ matrix.runtime }}
